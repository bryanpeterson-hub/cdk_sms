<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura's Lincolns Demo</title>
    <style>
        /* --- Basic Setup --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.imgur.com/Fuu98EC.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            min-height: 100vh;
            box-sizing: border-box;
            margin: 0; 
        }

        /* --- Hidden Hotspots --- */
        .hidden-hotspot {
            width: 100%;
            height: 100px;
            cursor: pointer;
            z-index: 100;
            position: fixed;
            left: 0;
        }
        
        #hotspot-top { top: 0; }
        #hotspot-bottom { bottom: 0; display: none; }

        /* --- Mobile Device Frame --- */
        .mobile-frame {
            width: 390px;
            height: 804px;
            background-color: #111;
            border-radius: 40px;
            border: 10px solid #111;
            box-shadow: 0 19px 38px rgba(0,0,0,0.50), 0 15px 12px rgba(0,0,0,0.32);
            position: relative;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            height: 100%;
            background-color: #fff;
            overflow: hidden;
            position: relative;
        }

        .screen-content {
            display: none; 
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
        }

        .screen-content.active {
            display: flex;
        }

        /* --- Lock Screens --- */
        #lock-screen-initial, #lock-screen-notification {
            background-color: #1a1a1a;
            color: white;
        }
        
        .lock-screen-overlay {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 70px 30px;
            position: relative;
            box-sizing: border-box;
        }

        .lock-time { font-size: 80px; font-weight: 300; margin-bottom: 0; color: #fff; }
        .lock-date { font-size: 18px; font-weight: 500; margin-top: 4px; text-transform: uppercase; }

        .lock-prompt {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* --- Notification --- */
        .notification-wrapper { width: 100%; padding-top: 50px; display: flex; justify-content: center; }
        .notification {
            width: 90%;
            background: rgba(255, 255, 255, 0.9);
            color: #111;
            border-radius: 20px;
            padding: 12px 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .notification-header { font-size: 12px; font-weight: 700; display: flex; align-items: center; }
        .notification-avatar {
            width: 20px; height: 20px;
            background-color: #000;
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; margin-right: 8px;
        }

        /* --- Messages App --- */
        #messages-app { background-color: #ffffff; }
        
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; height: 22px; border-bottom: 1px solid #f0f0f0;
        }
        .status-bar-time { font-size: 14px; font-weight: 600; color: #000; }

        .messages-header {
            padding: 15px 20px;
            display: flex; align-items: center;
            border-bottom: 1px solid #eee;
        }
        
        .messages-header .avatar {
            width: 36px; height: 36px;
            background-color: #000; color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; margin-right: 12px;
        }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column;
        }

        .message-bubble {
            padding: 12px 16px; border-radius: 18px;
            margin-bottom: 8px; max-width: 85%;
            font-size: 14px; line-height: 1.4;
            word-wrap: break-word;
        }

        .agent { background-color: #f1f0f0; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .user { background-color: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }

        .car-image {
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            display: block;
        }

        .chat-input-area {
            display: flex; padding: 15px; border-top: 1px solid #eee;
            background: #fff;
        }

        #chat-input {
            flex: 1; border: 1px solid #ddd; border-radius: 20px;
            padding: 8px 15px; outline: none;
        }

        #send-button {
            background: none; border: none; color: #007aff;
            font-weight: 600; margin-left: 10px; cursor: pointer;
        }

        /* --- Typing Indicator --- */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: #f1f0f0;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            margin-bottom: 8px;
        }

        .dot-container { display: flex; align-items: center; gap: 4px; height: 14px; }
        .dot { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <div class="hidden-hotspot" id="hotspot-top" onclick="showNotification()"></div>

    <div class="mobile-frame">
        <div class="screen">

            <div class="screen-content active" id="lock-screen-initial">
                <div class="lock-screen-overlay">
                    <h1 class="lock-time">01:14</h1>
                    <h2 class="lock-date">FRI, APR 3</h2>
                    <div class="lock-prompt">Swipe up to unlock</div>
                </div>
            </div>

            <div class="screen-content" id="lock-screen-notification" onclick="openMessages()">
                <div class="lock-screen-overlay">
                    <h1 class="lock-time">01:14</h1>
                    <div class="notification-wrapper">
                        <div class="notification">
                            <div class="notification-header">
                                <div class="notification-avatar">LL</div>
                                Laura's Lincolns &bull; Now
                            </div>
                            <div style="font-size: 13px; margin-top: 4px;">
                                Whether you’re still considering the Lincoln you viewed...
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="screen-content" id="messages-app">
                <div class="status-bar">
                    <span class="status-bar-time">1:14 PM</span>
                </div>
                <div class="messages-header">
                    <div class="avatar">LL</div>
                    <div style="font-weight:600">Laura's Lincolns</div>
                </div>

                <div class="chat-container" id="chat-container">
                    <div class="typing-indicator" id="typing-indicator">
                        <div class="dot-container">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>

                <form class="chat-input-area" id="chat-form">
                    <input type="text" id="chat-input" placeholder="iMessage" autocomplete="off">
                    <button type="submit" id="send-button">Send</button>
                </form>
            </div>

        </div>
    </div>

    <div class="hidden-hotspot" id="hotspot-bottom" onclick="showSarahReply()"></div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const hotspotBottom = document.getElementById('hotspot-bottom');
        let chatState = 0;

        function showScreen(id) {
            document.querySelectorAll('.screen-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addMessage(text, sender, isImage = false) {
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${sender}`;
            if (isImage) {
                bubble.innerHTML = `<img src="${text}" class="car-image">`;
            } else {
                bubble.innerHTML = text;
            }
            // Insert before typing indicator to keep dots at bottom
            chatContainer.insertBefore(bubble, typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping(duration, callback) {
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(() => {
                typingIndicator.style.display = 'none';
                callback();
            }, duration);
        }

        function showNotification() {
            if (chatState === 0) {
                showScreen('lock-screen-notification');
                chatState = 1;
            }
        }

        function openMessages() {
            showScreen('messages-app');
            if (chatState === 1) {
                // ADDED: First message appears instantly without typing delay
                addMessage("Whether you’re still considering the vehicle you viewed or exploring our latest arrivals, we’re here to help you find the perfect fit.<br><br>To help you decide, we're offering you an exclusive 48-hour extended test drive so you can truly experience how a Lincoln fits into your lifestyle.<br><br><strong>Schedule Your 48-Hour Extended Test Drive</strong>", "agent");
                chatState = 2;
            }
        }

        document.getElementById('chat-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const val = chatInput.value;
            if (!val) return;
            addMessage(val, 'user');
            chatInput.value = '';

            if (chatState === 2) {
                chatState = 3;
                showTyping(2000, () => {
                    addMessage("Here are some recommended vehicles based on your interests:", "agent");
                    
                    // Staggered local image reveals
                    setTimeout(() => addMessage("images/corsair.png", "agent", true), 600); 
                    setTimeout(() => addMessage("images/navigator.png", "agent", true), 1400); 
                    setTimeout(() => {
                        // --- UPDATED: Nautilus replaces MKZ ---
                        addMessage("images/nautilus.png", "agent", true); 
                        setTimeout(() => {
                            addMessage("<a href='#' style='color:#007aff'>Click to explore more inventory</a>", "agent");
                            chatState = 4;
                        }, 800);
                    }, 2200);
                });
            } 
            else if (chatState === 4) {
                chatState = 5;
                showTyping(2000, () => {
                    addMessage("Gotcha! I'm going to connect you with one of our human team members who can answer your questions. Hang tight, they'll be right with you in this chat!", "agent");
                    hotspotBottom.style.display = 'block';
                });
            }
        });

        function showSarahReply() {
            if (chatState === 5) {
                hotspotBottom.style.display = 'none';
                showTyping(2000, () => {
                    addMessage("Hello, I'm Sarah. I see you have some finance and insurance questions. How can I help?", "agent");
                    chatState = 6;
                });
            }
        }
    </script>
</body>
</html>
